name: Publish to LinkedIn

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths: ['src/content/blog/en/**']

permissions:
  contents: read
  pull-requests: read

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract blog slug from branch name
        id: slug
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # Branch format: blog/YYYY-MM-DD-slug
          SLUG=$(echo "$BRANCH" | sed 's|blog/[0-9]*-[0-9]*-[0-9]*-||')
          if [ -z "$SLUG" ] || [ "$SLUG" = "$BRANCH" ]; then
            # Fallback: extract from PR title (format: "blog: slug")
            TITLE="${{ github.event.pull_request.title }}"
            SLUG=$(echo "$TITLE" | sed 's|^blog: ||')
          fi
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "Extracted slug: $SLUG"

      - name: Publish to LinkedIn
        env:
          LINKEDIN_PUBLISH_SECRET: ${{ secrets.LINKEDIN_PUBLISH_SECRET }}
          BLOG_SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          PAYLOAD=$(jq -n --arg slug "$BLOG_SLUG" '{slug: $slug}')
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $LINKEDIN_PUBLISH_SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://www.juanelojga.com/api/linkedin/publish")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::LinkedIn publish failed with status $HTTP_CODE"
            exit 1
          fi

          echo "LinkedIn post published successfully"
