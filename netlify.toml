# netlify.toml (root of repo)
[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"
  NPM_FLAGS = "--version"

# Cache control for static assets (optional but nice)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Also cache public folder assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Optional: Explicit redirect from root to default locale
# (Your index.astro already handles this, but this can help with direct access)
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301
  force = true

# LinkedIn publishing functions
[[redirects]]
  from = "/api/linkedin/auth/start"
  to = "/.netlify/functions/linkedin-auth-start"
  status = 200

[[redirects]]
  from = "/api/linkedin/auth/callback"
  to = "/.netlify/functions/linkedin-auth-callback"
  status = 200

[[redirects]]
  from = "/api/linkedin/publish"
  to = "/.netlify/functions/linkedin-publish"
  status = 200

# Security headers (all pages)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# LLM and AI discovery files
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/humans.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"
